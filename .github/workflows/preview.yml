name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Deploy preview
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          PREVIEW_DIR="gh-pages/preview/pr-${PR_NUMBER}"

          mkdir -p "$PREVIEW_DIR"
          rsync -a --exclude='.git' --exclude='.github' --exclude='gh-pages' . "$PREVIEW_DIR/"

          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Deploy preview for PR #${PR_NUMBER}"
          git push origin gh-pages

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const repo = context.repo;
            const previewUrl = `https://${repo.owner}.github.io/${repo.repo}/preview/pr-${pr}/`;

            const comments = await github.rest.issues.listComments({
              ...repo,
              issue_number: pr,
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployment')
            );

            const body = `## Preview deployment\n\n` +
              `Forhandsvisning ar redo: [Oppna pa mobilen](${previewUrl})\n\n` +
              `**URL:** \`${previewUrl}\`\n\n` +
              `_Uppdateras automatiskt vid nya commits._`;

            if (botComment) {
              await github.rest.issues.updateComment({
                ...repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...repo,
                issue_number: pr,
                body,
              });
            }
